name: Python checks

on:
  push:
    paths:
      - "PAKPY/**/*.py"
      - ".github/workflows/python-syntax.yml"
  pull_request:
    paths:
      - "PAKPY/**/*.py"
      - ".github/workflows/python-syntax.yml"

permissions:
  contents: read

jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Compile repository Python sources
        working-directory: PAKPY
        run: python -m unittest test_repository_python_syntax
      - name: Run AVM2 and timeline repack tests
        working-directory: PAKPY
        run: >-
          python -m unittest
          test_ui_browser_avm2_repack
          test_ui_browser_avm2_duplicate_module_fix_patch
          test_ui_browser_avm2_variable_length_patch
          test_ui_browser_timeline_repack
